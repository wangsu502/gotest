syntax = "proto3";
package racing;

option go_package = "/racing";

import "google/protobuf/timestamp.proto";

service Racing {
  // ListRaces will return a collection of all races.
  rpc ListRaces(ListRacesRequest) returns (ListRacesResponse) {}

  // GetRace returns a single race by ID (per AIP-131).
  rpc GetRace(GetRaceRequest) returns (Race) {}
}

/* Requests/Responses */

// Request for GetRace call.
message GetRaceRequest {
  // ID of the race to retrieve.
  int64 id = 1;
}

message ListRacesRequest {
  ListRacesRequestFilter filter = 1;

  // Order specification for results (per AIP-132).
  // Format: "<field> [ASC|DESC]"
  //
  // Supported fields:
  //   advertised_start_time, id, meeting_id, name, number, visible
  //
  // Supported directions: ASC (default), DESC.
  // When empty, defaults to "advertised_start_time ASC".
  string order_by = 2;
}

// Response to ListRaces call.
message ListRacesResponse {
  repeated Race races = 1;
}

// Filter for listing races.
message ListRacesRequestFilter {
  repeated int64 meeting_ids = 1;
  // When true, only visible races are returned.
  // When false or unset, all races are returned regardless of visibility.
  optional bool visible_only = 2;
}

/* Resources */

// A race resource.
message Race {
  // ID represents a unique identifier for the race.
  int64 id = 1;
  // MeetingID represents a unique identifier for the races meeting.
  int64 meeting_id = 2;
  // Name is the official name given to the race.
  string name = 3;
  // Number represents the number of the race.
  int64 number = 4;
  // Visible represents whether or not the race is visible.
  bool visible = 5;
  // AdvertisedStartTime is the time the race is advertised to run.
  google.protobuf.Timestamp advertised_start_time = 6;

  // Status is derived from advertised_start_time.
  // "OPEN" if advertised_start_time is in the future, "CLOSED" otherwise.
  string status = 7;
}

